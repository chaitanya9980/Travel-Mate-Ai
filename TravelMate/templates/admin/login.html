<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TravelMate AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f172a;
            --accent: #2a9d8f;
            --accent-strong: #1f7f73;
            --highlight: #f4a261;
        }
        * {
            font-family: 'Manrope', sans-serif;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(1000px circle at -10% -20%, rgba(42, 157, 143, 0.28), transparent 60%),
                radial-gradient(800px circle at 110% 10%, rgba(244, 162, 97, 0.25), transparent 60%),
                #0f172a;
            color: white;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .glow-orb {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(0px);
            opacity: 0.55;
            animation: float 8s ease-in-out infinite;
        }
        .glow-orb.orb-1 {
            background: radial-gradient(circle, rgba(42, 157, 143, 0.6), transparent 70%);
            top: -120px;
            left: -120px;
        }
        .glow-orb.orb-2 {
            background: radial-gradient(circle, rgba(244, 162, 97, 0.65), transparent 70%);
            bottom: -140px;
            right: -80px;
            animation-delay: 1.5s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.96);
            color: var(--ink);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.35);
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 2;
            animation: cardRise 0.8s ease;
        }
        @keyframes cardRise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo i {
            font-size: 3rem;
            color: var(--accent);
        }
        .login-logo h2 {
            margin-top: 1rem;
            font-weight: 700;
            font-family: 'Sora', sans-serif;
        }
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.12);
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(42, 157, 143, 0.2);
        }
        .btn-login {
            background: linear-gradient(135deg, #2a9d8f, #1f7f73);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 999px;
            font-weight: 600;
            width: 100%;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(42, 157, 143, 0.35);
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--ink);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            color: var(--accent-strong);
        }
    </style>
</head>
<body>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-globe-americas"></i>
            <h2>Admin Panel</h2>
            <p class="text-muted">TravelMate AI Administration</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Enter username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('index') }}"><i class="fas fa-arrow-left me-1"></i>Back to Website</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
